# Live reload for local and Docker dev: https://github.com/air-verse/air
#
# With GOTARO_LIVE_TEMPLATES=1 (see Makefile / docker-compose.dev.yml), HTML templates are read from
# disk on each request — save a .html file and refresh the browser. Air rebuilds are for .go changes.
root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main ./cmd/app"
bin = "./tmp/main"
entrypoint = ["./tmp/main"]
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["tmp", "vendor", ".git"]
exclude_regex = ["_test\\.go"]
delay = 200
# Polling works more reliably than fsnotify on Docker volume mounts (macOS/Windows).
poll = true
poll_interval = 500
stop_on_error = false
send_interrupt = true
kill_delay = "500ms"

[log]
time = false
main_only = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = false

[screen]
clear_on_rebuild = false
keep_scroll = true
