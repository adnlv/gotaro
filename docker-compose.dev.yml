# Merge with the base file for live reload:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Or: make dev-docker
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      # Read .html from disk each request so template edits show after a browser refresh (no rebuild).
      GOTARO_LIVE_TEMPLATES: "1"
      GOTARO_TEMPLATE_DIR: /src/internal/web/templates
    volumes:
      - .:/src
