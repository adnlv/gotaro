{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{if .Title}}{{.Title}} — {{end}}Gotaro</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
	<script>
	(function () {
		try {
			var u = new URL(window.location.href);
			if (!u.searchParams.has('flash')) return;
			u.searchParams.delete('flash');
			var q = u.searchParams.toString();
			history.replaceState(null, '', u.pathname + (q ? '?' + q : '') + u.hash);
		} catch (e) {}
	})();
	</script>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
	<div class="container">
		<a class="navbar-brand" href="/tasks">Gotaro</a>
		<div class="navbar-nav ms-auto">
			{{if .User}}
			<span class="navbar-text me-3">{{.User.Email}}</span>
			<form method="post" action="/logout" class="d-inline">
				<input type="hidden" name="csrf_token" value="{{.CSRF}}">
				<button type="submit" class="btn btn-outline-light btn-sm">Log out</button>
			</form>
			{{else}}
			<a class="nav-link" href="/login">Log in</a>
			<a class="nav-link" href="/register">Register</a>
			{{end}}
		</div>
	</div>
</nav>
<main class="container pb-5">
	{{if .Flash}}<div class="alert alert-success alert-dismissible fade show auto-dismiss-alert" role="alert">
		<div>{{.Flash}}</div>
		<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close notification"></button>
		<div class="progress mt-2" style="height: 4px;" role="progressbar" aria-label="Time until message hides" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100">
			<div class="progress-bar bg-success auto-dismiss-progress-bar" style="width: 100%"></div>
		</div>
	</div>{{end}}
	{{if .Error}}<div class="alert alert-danger alert-dismissible fade show auto-dismiss-alert" role="alert">
		<div>{{.Error}}</div>
		<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close notification"></button>
		<div class="progress mt-2" style="height: 4px;" role="progressbar" aria-label="Time until message hides" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100">
			<div class="progress-bar bg-danger auto-dismiss-progress-bar" style="width: 100%"></div>
		</div>
	</div>{{end}}
	{{template "content" .}}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script>
(function () {
	var delayMs = 4500;
	document.querySelectorAll('.auto-dismiss-alert').forEach(function (el) {
		var bar = el.querySelector('.auto-dismiss-progress-bar');
		if (bar) {
			requestAnimationFrame(function () {
				requestAnimationFrame(function () {
					bar.style.transition = 'width ' + delayMs / 1000 + 's linear';
					bar.style.width = '0%';
				});
			});
		}
		var timerId = setTimeout(function () {
			if (!el.isConnected) return;
			try {
				bootstrap.Alert.getOrCreateInstance(el).close();
			} catch (e) {
				el.remove();
			}
		}, delayMs);
		el.addEventListener('close.bs.alert', function () {
			clearTimeout(timerId);
		});
	});
})();
</script>
</body>
</html>
{{end}}
