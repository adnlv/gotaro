{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{if .Title}}{{.Title}} — {{end}}Gotaro</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<style>
		body {
			font-family: 'Inter', system-ui, -apple-system, sans-serif;
			background-color: #f8f9fb;
		}
		a, .btn {
			transition: all 0.15s ease;
		}
		.card {
			border-radius: 0.75rem;
			border: 1px solid rgba(0, 0, 0, 0.06);
			transition: box-shadow 0.2s ease;
		}
		.badge {
			transition: background-color 0.15s ease;
		}
		.form-control:focus, .form-select:focus {
			border-color: #3b82f6;
			box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.15);
		}
		.badge-task {
			font-size: 0.7rem;
			font-weight: 500;
			letter-spacing: 0.03em;
			padding: 0.3em 0.7em;
		}
		.navbar {
			padding-top: 0.75rem;
			padding-bottom: 0.75rem;
		}
		.navbar-brand {
			font-weight: 700;
			font-size: 1.25rem;
			letter-spacing: -0.02em;
		}
		.notification-stack {
			position: fixed;
			bottom: max(1rem, env(safe-area-inset-bottom));
			right: max(1rem, env(safe-area-inset-right));
			left: auto;
			width: min(22rem, calc(100vw - 2rem - env(safe-area-inset-left) - env(safe-area-inset-right)));
			z-index: 1080;
			display: flex;
			flex-direction: column-reverse;
			align-items: stretch;
			gap: 0.5rem;
			pointer-events: none;
		}
		.notification-stack .alert {
			pointer-events: auto;
			margin-bottom: 0;
			border-radius: 0.75rem;
			box-shadow: 0 0.35rem 1rem rgba(0, 0, 0, 0.12);
		}
	</style>
	<script>
	(function () {
		try {
			var u = new URL(window.location.href);
			if (!u.searchParams.has('flash')) return;
			u.searchParams.delete('flash');
			var q = u.searchParams.toString();
			history.replaceState(null, '', u.pathname + (q ? '?' + q : '') + u.hash);
		} catch (e) {}
	})();
	</script>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm mb-4">
	<div class="container">
		<a class="navbar-brand text-primary" href="/tasks"><i class="bi bi-check2-square me-1"></i>Gotaro</a>
		<div class="navbar-nav ms-auto align-items-center">
			{{if .User}}
			<span class="navbar-text text-muted me-3 small">{{.User.Email}}</span>
			<form method="post" action="/logout" class="d-inline">
				<input type="hidden" name="csrf_token" value="{{.CSRF}}">
				<button type="submit" class="btn btn-sm btn-outline-secondary rounded-pill px-3"><i class="bi bi-box-arrow-right me-1"></i>Log out</button>
			</form>
			{{else}}
			<a class="nav-link text-dark" href="/login">Log in</a>
			<a class="btn btn-sm btn-primary rounded-pill ms-2 px-3" href="/register">Register</a>
			{{end}}
		</div>
	</div>
</nav>
<div class="notification-stack" aria-live="polite" aria-atomic="true">
	{{if .Flash}}<div class="alert alert-success alert-dismissible fade show auto-dismiss-alert" role="alert">
		<div><i class="bi bi-check-circle me-1"></i>{{.Flash}}</div>
		<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close notification"></button>
		<div class="progress mt-2" style="height: 4px;" role="progressbar" aria-label="Time until message hides" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100">
			<div class="progress-bar bg-success auto-dismiss-progress-bar" style="width: 100%"></div>
		</div>
	</div>{{end}}
	{{if .Error}}<div class="alert alert-danger alert-dismissible fade show auto-dismiss-alert" role="alert">
		<div><i class="bi bi-exclamation-triangle me-1"></i>{{.Error}}</div>
		<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close notification"></button>
		<div class="progress mt-2" style="height: 4px;" role="progressbar" aria-label="Time until message hides" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100">
			<div class="progress-bar bg-danger auto-dismiss-progress-bar" style="width: 100%"></div>
		</div>
	</div>{{end}}
</div>
<main class="container pb-5">
	{{template "content" .}}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script>
(function () {
	var delayMs = 4500;
	document.querySelectorAll('.auto-dismiss-alert').forEach(function (el) {
		var bar = el.querySelector('.auto-dismiss-progress-bar');
		if (bar) {
			requestAnimationFrame(function () {
				requestAnimationFrame(function () {
					bar.style.transition = 'width ' + delayMs / 1000 + 's linear';
					bar.style.width = '0%';
				});
			});
		}
		var timerId = setTimeout(function () {
			if (!el.isConnected) return;
			try {
				bootstrap.Alert.getOrCreateInstance(el).close();
			} catch (e) {
				el.remove();
			}
		}, delayMs);
		el.addEventListener('close.bs.alert', function () {
			clearTimeout(timerId);
		});
	});
})();
</script>
</body>
</html>
{{end}}
