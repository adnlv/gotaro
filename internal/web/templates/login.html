{{define "content"}}
<div class="row justify-content-center">
	<div class="col-md-6 col-lg-4">
		<h1 class="h3 mb-3">Log in</h1>
		<form method="post" action="/login" class="card card-body shadow-sm">
			<input type="hidden" name="csrf_token" value="{{.CSRF}}">
			<div class="mb-3">
				<label class="form-label" for="email">Email</label>
				<input class="form-control" id="email" name="email" type="email" autocomplete="username" required>
			</div>
			<div class="mb-3">
				<label class="form-label" for="password">Password</label>
				<input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
			</div>
			<button class="btn btn-primary w-100" type="submit">Log in</button>
		</form>
		<p class="mt-3 text-muted small">No account? <a href="/register">Register</a></p>
	</div>
</div>
{{end}}
