{{define "content"}}
<div class="row justify-content-center align-items-center" style="min-height: calc(100vh - 120px)">
	<div class="col-md-5 col-lg-4">
		<div class="text-center mb-4">
			<div class="mb-2"><i class="bi bi-check2-square text-primary" style="font-size: 2.5rem;"></i></div>
			<h1 class="h3 fw-bold">Create your account</h1>
			<p class="text-muted">Get started with Gotaro in seconds</p>
		</div>
		<form method="post" action="/register" class="card card-body shadow-sm border-0 p-4">
			<input type="hidden" name="csrf_token" value="{{.CSRF}}">
			<div class="mb-3">
				<label class="form-label fw-medium" for="email">Email</label>
				<div class="input-group">
					<span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
					<input class="form-control border-start-0" id="email" name="email" type="email" autocomplete="username" placeholder="you@example.com" required>
				</div>
			</div>
			<div class="mb-4">
				<label class="form-label fw-medium" for="password">Password</label>
				<div class="input-group">
					<span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
					<input class="form-control border-start-0" id="password" name="password" type="password" autocomplete="new-password" minlength="8" placeholder="At least 8 characters" required>
				</div>
				<div class="form-text"><i class="bi bi-info-circle me-1"></i>Must be at least 8 characters.</div>
			</div>
			<button class="btn btn-primary w-100 py-2 fw-medium" type="submit"><i class="bi bi-person-plus me-1"></i>Create account</button>
		</form>
		<p class="mt-3 text-center text-muted small">Already have an account? <a href="/login" class="fw-medium">Log in</a></p>
	</div>
</div>
{{end}}
